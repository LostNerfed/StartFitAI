<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anatomy Heatmap</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: transparent;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        svg {
            width: 100%;
            height: 100%;
            max-height: 90vh;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
        }

        /* Base Liquid Glass Look */
        .muscle path {
            fill: #2C2C2E;
            stroke: #3A3A3C;
            stroke-width: 0.3;
            transition: fill 0.8s ease-out, filter 0.8s ease-out;
            cursor: pointer;
        }

        /* Separation lines */
        .stroke path {
            fill: none;
            stroke: rgba(0,0,0,0.6);
            stroke-width: 0.8;
            pointer-events: none;
        }

        /* Neon Glow Active State */
        .muscle path.active {
            /* The fill color is assigned dynamically via JS */
            filter: drop-shadow(0px 0px 5px currentColor);
            stroke: rgba(255, 255, 255, 0.4);
            stroke-width: 0.5;
            z-index: 10;
        }
    </style>
</head>
<body>

<script>
    // Map abstract muscle groups to our SVG IDs
    const muscleMap = {
        "chest": ["CHEST_UPPER_L", "CHEST_LOWER_L", "CHEST_UPPER_R", "CHEST_LOWER_R"],
        "back": ["TRAPS_L", "TRAPS_R", "SERRATUS_L", "SERRATUS_R"], // Front view visible back muscles
        "shoulder": ["DELT_FRONT_L", "DELT_MID_L", "DELT_FRONT_R", "DELT_MID_R"],
        "arm": ["BICEP_L", "TRICEP_L", "BRACHIO_L", "FLEXOR_L", "EXTENSOR_L", 
                "BICEP_R", "TRICEP_R", "BRACHIO_R", "FLEXOR_R", "EXTENSOR_R"],
        "abs": ["ABS1_L", "ABS2_L", "ABS3_L", "ABS4_L", "OBLIQUE_L",
                "ABS1_R", "ABS2_R", "ABS3_R", "ABS4_R", "OBLIQUE_R"],
        "leg": ["QUAD_LAT_L", "QUAD_RECT_L", "QUAD_MED_L", "ADDUCTOR_L",
                "QUAD_LAT_R", "QUAD_RECT_R", "QUAD_MED_R", "ADDUCTOR_R",
                "CALF_MED_L", "CALF_LAT_L", "SOLEUS_L",
                "CALF_MED_R", "CALF_LAT_R", "SOLEUS_R"]
    };

    // Called from Android Viewmodel via Javascript Bridge
    function updateMuscleColors(jsonColors) {
        try {
            const colors = JSON.parse(jsonColors);
            
            // 1. Reset all paths to base glass state
            document.querySelectorAll('.muscle path').forEach(path => {
                path.style.fill = '#2C2C2E';
                path.style.color = 'transparent'; // Reset glow color
                path.classList.remove('active');
            });

            // 2. Apply intensity-based colors to specific muscle groups
            for (const [group, rgbaStr] of Object.entries(colors)) {
                if (muscleMap[group]) {
                    // Extract hex color or rgba
                    const colorValue = rgbaStr; 
                    
                    muscleMap[group].forEach(id => {
                        const path = document.getElementById(id);
                        if (path) {
                            path.style.fill = colorValue;
                            path.style.color = colorValue; // Used by drop-shadow (currentColor)
                            path.classList.add('active'); // Triggers the neon glow via CSS
                        }
                    });
                }
            }
        } catch(e) {
            console.error("Error applying colors:", e);
        }
    }

    // Interactive testing - remove in prod if not needed
    document.querySelectorAll('.muscle path').forEach(path => {
        path.addEventListener('click', () => {
            if(!path.classList.contains('active')) {
                path.style.fill = '#FF5252';
                path.style.color = '#FF5252';
                path.classList.add('active');
            } else {
                path.style.fill = '#2C2C2E';
                path.classList.remove('active');
            }
        });
    });
</script>
